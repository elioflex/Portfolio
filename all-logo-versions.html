<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Logo Versions - IdeaToAutomation</title>
  <style>
    body {
      margin: 0;
      font-family: Manrope, system-ui, sans-serif;
      background: linear-gradient(180deg, #f5f9ff, #eef5fd);
      color: #14304a;
      padding: 28px;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { margin: 0 0 8px; font-family: Sora, Manrope, sans-serif; }
    p { margin: 0 0 18px; color: #5f7287; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }
    .card {
      background: #fff;
      border: 1px solid #d9e6f4;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 10px 25px rgba(40, 72, 110, 0.08);
    }
    .card h2 { margin: 0 0 8px; font-size: 1rem; }
    .card img { width: 100%; max-width: 420px; height: auto; display: block; }
    .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid #cde0f2;
      padding: 8px 12px;
      text-decoration: none;
      color: #17344f;
      font-weight: 700;
      font-size: 0.9rem;
      background: #f8fbff;
    }
    .btn.primary {
      background: linear-gradient(120deg, #14b8a6, #3b82f6);
      border-color: transparent;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>All Logo Versions Ready</h1>
    <p>Each concept has its own full website version (logo + favicon pack already connected).</p>

    <div class="grid">
      <article class="card">
        <h2>Concept 1 · Monoline</h2>
        <img src="assets/logo/tests/round-2-clean/concept-1-monoline-primary-light.svg" alt="Concept 1" />
        <div class="actions">
          <a class="btn primary" href="index-concept-1.html">Open Website</a>
          <a class="btn" href="assets/logo/tests/round-2-clean/preview.html">Open Compare</a>
        </div>
      </article>

      <article class="card">
        <h2>Concept 2 · Orbit</h2>
        <img src="assets/logo/tests/round-2-clean/concept-2-orbit-primary-light.svg" alt="Concept 2" />
        <div class="actions">
          <a class="btn primary" href="index-concept-2.html">Open Website</a>
          <a class="btn" href="assets/logo/tests/round-2-clean/preview.html">Open Compare</a>
        </div>
      </article>

      <article class="card">
        <h2>Concept 3 · Executive</h2>
        <img src="assets/logo/tests/round-2-clean/concept-3-executive-primary-light.svg" alt="Concept 3" />
        <div class="actions">
          <a class="btn primary" href="index-concept-3.html">Open Website</a>
          <a class="btn" href="assets/logo/tests/round-2-clean/preview.html">Open Compare</a>
        </div>
      </article>
    </div>
  </div>
</body>
</html>
