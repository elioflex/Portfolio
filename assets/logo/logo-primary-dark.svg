<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">I2A Allerta Simple Dark</title>
  <desc id="desc">Logo simple I2A en Allerta Stencil pour fond sombre</desc>
  <defs>
    <linearGradient id="brandGrad" x1="48" y1="44" x2="660" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8ec3ff"/>
      <stop offset="1" stop-color="#6ce7df"/>
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Allerta+Stencil&amp;display=swap');

    .brand {
      font-family: 'Allerta Stencil', 'Arial Black', sans-serif;
      font-size: 168px;
      letter-spacing: 0.08em;
      font-weight: 400;
    }

    .tag {
      font-family: 'Allerta Stencil', 'Arial Black', sans-serif;
      font-size: 34px;
      letter-spacing: 0.18em;
      font-weight: 400;
      fill: #c2d6ea;
    }
  </style>

  <rect x="32" y="40" width="14" height="182" rx="7" fill="url(#brandGrad)"/>
  <text x="72" y="170" class="brand" fill="url(#brandGrad)">I2A</text>
  <text x="76" y="222" class="tag">IDEA TO AUTOMATION</text>
</svg>
